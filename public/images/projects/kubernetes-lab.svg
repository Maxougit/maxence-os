<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Architecture du cluster Kubernetes de test</title>
  <desc id="desc">Trois machines virtuelles Ubuntu forment un cluster Kubernetes de laboratoire sur un serveur Unraid, accompagné de machines Docker et GitLab Runner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10131d"/>
      <stop offset="1" stop-color="#171b2a"/>
    </linearGradient>
    <linearGradient id="kube" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#326ce5"/>
      <stop offset="1" stop-color="#1451c3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <circle cx="1090" cy="48" r="180" fill="#326ce5" opacity=".07"/>
  <text x="56" y="66" fill="#f7f8fc" font-family="system-ui, sans-serif" font-size="29" font-weight="700">Cluster Kubernetes de test</text>
  <text x="56" y="97" fill="#99a2b8" font-family="system-ui, sans-serif" font-size="16">Laboratoire multi-nœud virtualisé et isolé du réseau de production</text>

  <g stroke="#50617f" stroke-width="3" fill="none" opacity=".78">
    <path d="M600 243V291"/>
    <path d="M270 291H930"/>
    <path d="M270 291V335M600 291V335M930 291V335"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="443" y="132" width="314" height="112" rx="24" fill="url(#kube)"/>
    <g transform="translate(484 158)" stroke="#fff" stroke-width="3" fill="none">
      <circle cx="30" cy="30" r="22"/>
      <circle cx="30" cy="30" r="7"/>
      <path d="M30 0v13M30 47v13M0 30h13M47 30h13M9 9l9 9M42 42l9 9M51 9l-9 9M18 42l-9 9"/>
    </g>
    <text x="556" y="177" fill="#fff" font-family="system-ui, sans-serif" font-size="17" font-weight="600">ORCHESTRATION</text>
    <text x="556" y="210" fill="#fff" font-family="system-ui, sans-serif" font-size="25" font-weight="750">Kubernetes</text>
  </g>

  <g font-family="system-ui, sans-serif" filter="url(#shadow)">
    <g>
      <rect x="116" y="335" width="308" height="144" rx="22" fill="#202637" stroke="#3b465e"/>
      <circle cx="158" cy="378" r="24" fill="#e95420"/>
      <circle cx="158" cy="378" r="9" fill="#202637"/>
      <circle cx="158" cy="354" r="5" fill="#e95420" stroke="#fff" stroke-width="3"/>
      <text x="196" y="374" fill="#f7f8fc" font-size="18" font-weight="700">Nœud Ubuntu 01</text>
      <text x="196" y="400" fill="#8eb6ff" font-size="14" font-weight="600">WORKER</text>
      <rect x="142" y="429" width="116" height="31" rx="15" fill="#2c3447"/>
      <text x="159" y="450" fill="#c8d0df" font-size="13">4 vCPU · 3 Go</text>
    </g>
    <g>
      <rect x="446" y="335" width="308" height="144" rx="22" fill="#202637" stroke="#4b68a2" stroke-width="2"/>
      <circle cx="488" cy="378" r="24" fill="#e95420"/>
      <circle cx="488" cy="378" r="9" fill="#202637"/>
      <circle cx="488" cy="354" r="5" fill="#e95420" stroke="#fff" stroke-width="3"/>
      <text x="526" y="374" fill="#f7f8fc" font-size="18" font-weight="700">Nœud Ubuntu 02</text>
      <text x="526" y="400" fill="#8eb6ff" font-size="14" font-weight="600">CONTROL PLANE</text>
      <rect x="472" y="429" width="116" height="31" rx="15" fill="#2c3447"/>
      <text x="489" y="450" fill="#c8d0df" font-size="13">4 vCPU · 3 Go</text>
    </g>
    <g>
      <rect x="776" y="335" width="308" height="144" rx="22" fill="#202637" stroke="#3b465e"/>
      <circle cx="818" cy="378" r="24" fill="#e95420"/>
      <circle cx="818" cy="378" r="9" fill="#202637"/>
      <circle cx="818" cy="354" r="5" fill="#e95420" stroke="#fff" stroke-width="3"/>
      <text x="856" y="374" fill="#f7f8fc" font-size="18" font-weight="700">Nœud Ubuntu 03</text>
      <text x="856" y="400" fill="#8eb6ff" font-size="14" font-weight="600">WORKER</text>
      <rect x="802" y="429" width="116" height="31" rx="15" fill="#2c3447"/>
      <text x="819" y="450" fill="#c8d0df" font-size="13">4 vCPU · 3 Go</text>
    </g>
  </g>

  <g font-family="system-ui, sans-serif">
    <rect x="56" y="526" width="1088" height="58" rx="18" fill="#202637" stroke="#343c51"/>
    <rect x="74" y="540" width="152" height="31" rx="15" fill="#ff5c35" opacity=".17"/>
    <text x="97" y="561" fill="#ff8d6e" font-size="13" font-weight="700">UNRAID · KVM</text>
    <text x="256" y="561" fill="#aeb7ca" font-size="14">VM Docker dédiée</text>
    <circle cx="391" cy="555" r="3" fill="#59657a"/>
    <text x="411" y="561" fill="#aeb7ca" font-size="14">VM Debian GitLab</text>
    <circle cx="555" cy="555" r="3" fill="#59657a"/>
    <text x="575" y="561" fill="#aeb7ca" font-size="14">GitLab Runner</text>
    <circle cx="706" cy="555" r="3" fill="#59657a"/>
    <text x="726" y="561" fill="#aeb7ca" font-size="14">Réseaux virtuels isolés</text>
  </g>
</svg>
